<!DOCTYPE html>
<html>
<head>
    <title>Photo gallery</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    
    <style>

        @font-face {
            font-family: Overpass;
            src: url("{{url_for('static', filename='overpass-mono-regular.otf')}}") format("opentype");
        }
        
        @font-face {
            font-family: Overpass;
            font-weight: light;
            src: url("{{url_for('static', filename='overpass-mono-light.otf')}}") format("opentype");
        }
        
        </style>

</head>


<body style="background-color:#181926;">

<h1 class="title" style="font-family:overpass, light;">Photo gallery</h1>

<div class="divider-line"></div>

<div class="gallery">
        

    {% for image_name in sorted_images %}
    {% if image_name['height'] < image_name['width'] %}


        <div class="image">
            <a href="/{{image_name['name']}}">
                <image src="{{url_for('static', filename='thumbs/'+image_name['name'])}}">
            </a>
        </div>

        {% elif image_name['width'] <= image_name['height'] %}
        <div class="image">
            <a href="/{{image_name['name']}}">
                <image src="{{url_for('static', filename='thumbs/'+image_name['name'])}}">
            </a>
        </div>

        {% endif %}

        {% endfor %}
          
    </div>

</div>
</body>

</html>
